name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install ruff
      - name: Lint (ruff)
        run: ruff check app
      - name: Run tests
        env:
          DATABASE_URL: "sqlite:////tmp/ci.db"
          JWT_SECRET: "ci-test-secret"
          CORS_ORIGINS: "http://localhost:3000"
        run: pytest tests/ -v

  frontend-build:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "https://api.civicnow.example.com/api/v1"
          NEXT_PUBLIC_SITE_URL: "https://civicnow.example.com"
        run: npm run build

  # Deploys are triggered by Vercel's and Render's own GitHub App integrations
  # (auto-deploy on push to main — see DEPLOYMENT.md), not by this workflow.
  # This job just gates that path: it only "succeeds" (and therefore only lets
  # a human trust the auto-deployed result) once both build jobs above pass.
  # If you'd rather have GitHub Actions own the deploy trigger explicitly
  # instead of relying on Vercel/Render's push hooks, add `render-deploy` /
  # `vercel-deploy` steps here using their CLIs and repo secrets
  # (RENDER_DEPLOY_HOOK_URL, VERCEL_TOKEN) — intentionally left out because
  # those secrets belong to whoever owns the hosting accounts, not this repo.
  deploy-gate:
    name: Deploy gate
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - run: echo "Backend and frontend checks passed on main — safe to auto-deploy."
